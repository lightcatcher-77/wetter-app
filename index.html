<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Wetter">
  <meta name="theme-color" content="#0a1520">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" href="apple-touch-icon.png">
  <title>Wetter Live</title>
  <script src="chart.umd.js"></script>
  <link rel="stylesheet" href="leaflet/leaflet.css">
  <script src="leaflet/leaflet.js"></script>
  <style>
    @font-face{font-family:'Outfit';font-style:normal;font-weight:300 700;font-display:swap;src:url('fonts/outfit.woff2') format('woff2');}
    :root {
      color-scheme: light;
      --sky-top:#0a1520;--sky-mid:#16294a;--sky-bottom:#2e5d8e;
      --text:#e8edf4;--text-dim:#8ba0b8;--accent:#f5c842;
      --green:#56d68c;--orange:#f2994a;--red:#eb5757;--blue:#6ba3d6;
      --card:rgba(255,255,255,0.07);--border:rgba(255,255,255,0.12);
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Outfit',sans-serif;background:linear-gradient(170deg,var(--sky-top) 0%,var(--sky-mid) 40%,var(--sky-bottom) 100%);color:var(--text);min-height:100vh;}
    .container{max-width:960px;margin:0 auto;padding:calc(28px + env(safe-area-inset-top)) 16px 60px;}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .header{text-align:center;margin-bottom:28px;animation:fadeIn .6s;position:relative;}
    .header h1{font-family:'Outfit',sans-serif;font-size:clamp(28px,5.5vw,46px);font-weight:400;line-height:1.1;margin:10px 0 6px;}
    .accent{color:var(--accent);}
    .sub{font-size:13px;color:var(--text-dim);font-weight:300;}
    .badge{display:inline-flex;align-items:center;gap:7px;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;background:rgba(86,214,140,.12);border:1px solid rgba(86,214,140,.3);color:var(--green);margin:0 44px 10px;max-width:calc(100% - 88px);}
    .badge.stale{background:rgba(242,153,74,.12);border-color:rgba(242,153,74,.3);color:var(--orange);}
    .dot{width:8px;height:8px;border-radius:50%;background:currentColor;animation:pulse 2s infinite;}
    .reload{position:absolute;top:0;right:0;width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:17px;cursor:pointer;line-height:1;}
    .reload.loading{animation:spin 1s linear infinite;pointer-events:none;opacity:.6;}
    .favstar{position:absolute;top:0;left:0;width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text-dim);font-size:17px;cursor:pointer;line-height:1;}
    .favstar.on{color:var(--accent);border-color:rgba(245,200,66,.45);}
    .loc-chips{display:flex;gap:8px;overflow-x:auto;padding:4px 2px;margin-top:14px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
    .loc-chips::-webkit-scrollbar{display:none;}
    .chip{flex-shrink:0;padding:7px 14px;border-radius:18px;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:13px;cursor:pointer;}
    .chip.active{border-color:rgba(245,200,66,.55);background:rgba(245,200,66,.1);color:var(--accent);}
    .chip.fav{display:inline-flex;align-items:center;gap:7px;user-select:none;-webkit-user-select:none;}
    .chip.fav.editing{touch-action:none;cursor:grab;border-style:dashed;border-color:rgba(245,200,66,.4);}
    .chip.fav.dragging{cursor:grabbing;border-style:solid;border-color:rgba(245,200,66,.6);box-shadow:0 10px 24px rgba(0,0,0,.4);transform:scale(1.05);pointer-events:none;z-index:50;}
    .drop-indicator{flex-shrink:0;align-self:stretch;width:3px;border-radius:2px;background:var(--accent);box-shadow:0 0 6px rgba(245,200,66,.6);}
    .chip-remove{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;font-size:10px;line-height:1;color:var(--text-dim);}
    .edit-btn{flex-shrink:0;}
    .edit-btn.active{border-color:rgba(245,200,66,.55);background:rgba(245,200,66,.1);color:var(--accent);}
    .chip-remove:hover{background:rgba(255,255,255,.15);color:var(--text);}
    .loc-search{margin-top:10px;text-align:left;}
    .loc-search .search-row{display:flex;gap:8px;}
    .loc-search input{flex:1;padding:10px 14px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:inherit;font-size:14px;outline:none;}
    .loc-search input::placeholder{color:var(--text-dim);}
    .loc-search .search-row button{padding:10px 18px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:inherit;font-size:14px;cursor:pointer;}
    .sr-item{display:flex;justify-content:space-between;gap:12px;width:100%;padding:10px 14px;margin-top:6px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:inherit;font-size:14px;cursor:pointer;text-align:left;}
    .sr-item span{color:var(--text-dim);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .sr-note{padding:10px 4px;font-size:13px;color:var(--text-dim);}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;backdrop-filter:blur(12px);}
    .radar-card{padding:16px 16px 14px;margin-bottom:18px;animation:slideUp .5s;}
    .radar-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;}
    #radar-map{height:220px;border-radius:12px;overflow:hidden;background:#0a1520;}
    .leaflet-control-attribution{background:rgba(10,20,30,.55) !important;color:var(--text-dim) !important;font-size:9px !important;}
    .leaflet-control-attribution a{color:var(--text-dim) !important;}
    .leaflet-control-zoom a{background:var(--card) !important;color:var(--text) !important;border-color:var(--border) !important;}
    .radar-time-big{text-align:center;font-size:16px;font-weight:700;color:var(--accent);margin-top:12px;letter-spacing:.2px;}
    .radar-controls{display:flex;align-items:flex-start;gap:10px;margin-top:6px;}
    .radar-btn{flex-shrink:0;width:32px;height:32px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .radar-slider-wrap{position:relative;flex:1;padding-bottom:16px;padding-top:5px;}
    .radar-slider-wrap input[type=range]{width:100%;display:block;accent-color:var(--accent);position:relative;z-index:2;}
    .radar-ticks{position:absolute;left:8px;right:8px;top:20px;height:14px;pointer-events:none;}
    .radar-tick{position:absolute;top:0;width:1px;height:6px;background:var(--border);transform:translateX(-50%);}
    .radar-tick.hour{height:9px;background:var(--text-dim);}
    .radar-tick.now{width:2px;height:12px;background:var(--accent);box-shadow:0 0 5px rgba(245,200,66,.7);}
    .radar-tick-label{position:absolute;top:7px;font-size:9px;color:var(--text-dim);transform:translateX(-50%);white-space:nowrap;}
    .radar-tick-label.now{color:var(--accent);font-weight:700;}
    .radar-badge{flex-shrink:0;font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 9px;border-radius:10px;background:rgba(86,214,140,.12);border:1px solid rgba(86,214,140,.3);color:var(--green);}
    .radar-badge.forecast{background:rgba(245,200,66,.12);border-color:rgba(245,200,66,.35);color:var(--accent);}
    .radar-note{font-size:11px;color:var(--text-dim);margin-top:8px;line-height:1.5;}
    .warning{display:flex;gap:12px;align-items:flex-start;background:rgba(242,153,74,.09);border:1px solid rgba(242,153,74,.25);border-radius:14px;padding:14px 16px;margin-bottom:18px;animation:slideUp .5s;}
    .warning strong{color:var(--orange);}
    .warning p{font-size:13px;color:var(--text-dim);margin-top:3px;line-height:1.6;}
    .warning.danger{background:rgba(235,87,87,.09);border-color:rgba(235,87,87,.45);}
    .warning.danger strong{color:var(--red);}
    .hero{display:grid;grid-template-columns:1.1fr 0.9fr;gap:14px;margin-bottom:14px;animation:slideUp .55s;}
    .hero-main{padding:32px 24px;text-align:center;}
    .hero-main .big-icon{font-size:72px;line-height:1;display:block;margin-bottom:10px;}
    .hero-main .big-temp{font-family:'Outfit',sans-serif;font-size:64px;font-weight:400;line-height:1;}
    .hero-main .big-unit{font-size:28px;color:var(--text-dim);vertical-align:super;}
    .hero-main .condition{font-size:16px;color:var(--text-dim);margin-top:10px;}
    .hero-main .feels{font-size:13px;color:var(--text-dim);margin-top:4px;}
    .radar-flag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:4px 11px;border-radius:10px;margin-top:10px;background:rgba(107,163,214,.14);border:1px solid rgba(107,163,214,.35);color:var(--blue);}
    .radar-flag.mittel{background:rgba(86,214,140,.14);border-color:rgba(86,214,140,.35);color:var(--green);}
    .radar-flag.stark{background:rgba(235,87,87,.14);border-color:rgba(235,87,87,.4);color:var(--red);}
    .radar-flag.keins{background:var(--card);border-color:var(--border);color:var(--text-dim);}
    .hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px;align-content:center;}
    .stat-box{background:rgba(255,255,255,0.05);border-radius:12px;padding:14px 10px;text-align:center;}
    .stat-box .sv{font-size:20px;font-weight:600;}
    .stat-box .sl{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
    .stat-box.thunder-stat{background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.3);}
    .stat-box.thunder-stat .sv{color:var(--accent);}
    .hourly-card{margin-bottom:14px;animation:slideUp .6s;}
    .hourly-head{font-family:'Outfit',sans-serif;font-size:18px;color:var(--text-dim);padding:18px 22px 12px;}
    .hourly-scroll{overflow-x:auto;padding:0 16px 16px;}
    .hourly-inner{display:flex;gap:8px;width:max-content;}
    .h-cell{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center;width:68px;flex-shrink:0;}
    .h-cell.h-now{border-color:rgba(245,200,66,.5);background:rgba(245,200,66,.08);}
    .h-cell.h-night{background:rgba(10,21,32,0.5);}
    .h-cell.h-storm{border-color:rgba(245,200,66,.45);background:rgba(245,200,66,.06);}
    .h-lbl{font-size:10px;color:var(--text-dim);font-weight:600;letter-spacing:.5px;margin-bottom:4px;}
    .h-icon{font-size:22px;display:block;margin:2px 0;}
    .h-temp{font-size:14px;font-weight:600;margin-top:4px;}
    .h-rain{font-size:10px;color:var(--blue);margin-top:3px;}
    .h-thunder{font-size:10px;color:var(--accent);font-weight:700;margin-top:2px;}
    .h-wind{font-size:10px;color:var(--text-dim);margin-top:2px;}
    .fc-scroll{overflow-x:auto;margin-bottom:14px;padding-bottom:6px;}
    .fc-grid{display:grid;gap:8px;animation:slideUp .65s;}
    .fc-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;}
    .fc-card.sel{border-color:rgba(107,163,214,.65);background:rgba(107,163,214,.08);}
    .fc-card.today{border-color:rgba(245,200,66,.45);background:rgba(245,200,66,.06);}
    .fc-card.best{border-color:rgba(86,214,140,.45);background:rgba(86,214,140,.06);position:relative;overflow:hidden;}
    .fc-card.best::after{content:'★ BEST';position:absolute;top:9px;right:-22px;background:var(--green);color:#0a1520;font-size:8px;font-weight:800;letter-spacing:1.2px;padding:3px 30px;transform:rotate(35deg);}
    .fc-day{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;}
    .fc-date{font-size:12px;color:var(--text-dim);margin-bottom:6px;}
    .fc-icon{font-size:30px;display:block;margin:4px 0 6px;}
    .fc-max{font-size:20px;font-weight:600;}
    .fc-min{font-size:13px;color:var(--text-dim);margin-top:1px;}
    .fc-spread{font-size:10px;color:var(--text-dim);margin-top:3px;}
    .fc-rain{font-size:11px;color:var(--blue);margin-top:6px;}
    .fc-thunder{font-size:11px;color:var(--accent);font-weight:700;margin-top:2px;}
    .fc-sun{font-size:11px;color:var(--accent);margin-top:4px;}
    .fc-wind{font-size:11px;color:var(--text-dim);margin-top:2px;}
    .tap-hint{font-size:11px;color:var(--text-dim);text-align:center;margin:-6px 0 14px;}
    .day-detail{margin-bottom:14px;animation:slideUp .3s;position:relative;}
    .dd-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text-dim);font-size:14px;cursor:pointer;line-height:1;}
    .dd-head{font-family:'Outfit',sans-serif;font-size:18px;color:var(--text-dim);padding:18px 22px 12px;}
    .dd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 16px 16px;}
    .dd-seg{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;padding:14px 8px;text-align:center;}
    .dd-lbl{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;}
    .dd-icon{font-size:30px;display:block;margin:8px 0 6px;}
    .dd-cond{font-size:12px;color:var(--text-dim);margin-bottom:6px;min-height:28px;}
    .dd-temp{font-size:18px;font-weight:600;}
    .dd-min{font-size:13px;color:var(--text-dim);font-weight:400;}
    .dd-rain{font-size:11px;color:var(--blue);margin-top:6px;}
    .dd-wind{font-size:11px;color:var(--text-dim);margin-top:2px;}
    .dd-models{font-size:11px;color:var(--text-dim);padding:0 22px 16px;}
    .chart-section{padding:22px;margin-bottom:14px;animation:slideUp .75s;}
    .chart-wrap{position:relative;height:260px;}
    @media(max-width:620px){.chart-wrap{height:300px;}}
    .chart-model-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px;font-size:11px;color:var(--text-dim);}
    .chart-model-legend span{display:inline-flex;align-items:center;gap:6px;}
    .chart-model-legend .dot{width:8px;height:8px;border-radius:50%;flex:none;}
    .section-title{font-family:'Outfit',sans-serif;font-size:18px;color:var(--text-dim);margin-bottom:16px;}
    .section-title.collapsible{cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;margin-bottom:0;}
    .section-title.collapsible .chevron{font-size:14px;transition:transform .25s ease;color:var(--text-dim);}
    .section-title.collapsible.open .chevron{transform:rotate(180deg);}
    .collapse-body{max-height:0;overflow:hidden;transition:max-height .35s ease,opacity .3s ease;opacity:0;}
    .collapse-body.open{max-height:900px;opacity:1;margin-top:16px;}
    .model-matrix-card{padding:22px;margin-bottom:14px;animation:slideUp .78s;}
    .mm-scroll{overflow-x:auto;}
    .model-matrix{display:grid;gap:3px;}
    .mm-head{font-size:10.5px;color:var(--text-dim);text-align:center;padding-bottom:4px;}
    .mm-row-label{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text);padding-right:6px;white-space:nowrap;}
    .mm-row-label.konsens{font-weight:700;}
    .mm-dot{width:8px;height:8px;border-radius:50%;flex:none;}
    .mm-cell{border-radius:8px;text-align:center;padding:6px 2px 5px;font-size:14px;}
    .mm-cell .mm-pct{display:block;font-size:11px;font-weight:600;color:var(--text);margin-top:2px;}
    .mm-cell .mm-mm{display:block;font-size:9px;color:var(--text-dim);margin-top:1px;}
    .mm-konsens{background:rgba(245,200,66,.08);border-radius:8px;text-align:center;padding:6px 2px 5px;}
    .mm-konsens .mm-pct{font-size:14px;font-weight:700;color:var(--accent);}
    .mm-konsens .mm-spread{display:block;font-size:9.5px;color:var(--text-dim);margin-top:2px;}
    .mm-sep{grid-column:1/-1;border-top:1px solid var(--border);margin:2px 0;}
    .mm-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;font-size:11px;color:var(--text-dim);}
    .mm-legend span{display:inline-flex;align-items:center;gap:6px;}
    .scores-card{padding:18px 22px;margin-bottom:14px;animation:slideUp .8s;}
    .score-grid{display:grid;gap:8px;}
    .score-item{text-align:center;}
    .score-num{font-size:16px;font-weight:700;}
    .score-bwrap{height:60px;display:flex;align-items:flex-end;justify-content:center;margin:6px 0 4px;}
    .score-bar{width:20px;border-radius:4px 4px 0 0;}
    .score-lbl{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;}
    .verdict{padding:24px;animation:slideUp .9s;}
    .verdict h3{font-family:'Outfit',sans-serif;font-size:22px;margin-bottom:12px;}
    .verdict p{font-size:14px;line-height:1.8;color:var(--text-dim);margin-bottom:14px;}
    .hl-box{background:rgba(86,214,140,.1);border:1px solid rgba(86,214,140,.25);border-radius:12px;padding:12px 16px;font-size:15px;font-weight:600;color:var(--green);text-align:center;}
    .footer{text-align:center;margin-top:24px;font-size:12px;color:var(--text-dim);animation:fadeIn 1s;}
    .footer a{color:var(--accent);text-decoration:none;}
    .footer a:hover{text-decoration:underline;}
    @media(max-width:620px){.hero{grid-template-columns:1fr;}.hero-stats{grid-template-columns:repeat(4,1fr);}}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <button class="favstar" id="fav-btn" title="Als Favorit speichern" aria-label="Favorit speichern/entfernen" onclick="toggleFav()" style="display:none">☆</button>
    <button class="reload" id="reload-btn" title="Neu laden" aria-label="Neu laden" onclick="loadAll()">↻</button>
    <div class="badge" id="badge"><span class="dot"></span><span id="badge-txt">Wird geladen…</span></div>
    <h1>Wetter <span class="accent" id="loc-name">…</span></h1>
    <div class="sub" id="loc-sub">Standort wird ermittelt</div>
    <div class="loc-chips" id="loc-chips"></div>
    <div class="loc-search" id="loc-search" style="display:none">
      <div class="search-row">
        <input id="search-input" type="search" placeholder="Ort suchen, z. B. Berlin…" autocomplete="off" oninput="onSearchInput()" onkeydown="if(event.key==='Enter'){event.preventDefault();runSearch();}">
        <button onclick="runSearch()">Suchen</button>
      </div>
      <div id="search-results"></div>
    </div>
  </div>
  <div id="content-top"></div>
  <div class="card radar-card">
    <div class="radar-head">
      <div class="section-title" style="margin-bottom:0">🌧️ Regenradar</div>
      <span class="radar-badge" id="radar-badge">LIVE</span>
    </div>
    <div id="radar-map"></div>
    <div class="radar-time-big" id="radar-time">Lädt…</div>
    <div class="radar-controls">
      <button class="radar-btn" id="radar-play" onclick="radarTogglePlay()" title="Animation abspielen/pausieren">▶</button>
      <div class="radar-slider-wrap">
        <input type="range" id="radar-slider" min="0" max="0" value="0" oninput="radarSeek(this.value)">
        <div class="radar-ticks" id="radar-ticks"></div>
      </div>
    </div>
    <div class="radar-note" id="radar-note">Vergangene ~2 Std. (RainViewer). Eine Kurzfrist-Prognose ist kein garantierter Teil der kostenlosen API und wird nur angezeigt, wenn RainViewer gerade welche berechnet hat.</div>
  </div>
  <div id="content-bottom"></div>
  <div id="check-result" style="text-align:center;padding:0 0 8px"></div>
</div>
<script>
// ── Konfiguration ────────────────────────────────────────────────────────────
const FALLBACK = { lat: 47.5676, lon: 10.7012, name: 'Füssen' };
const MODELS = ['icon_seamless','ecmwf_ifs025','gfs_seamless','meteofrance_seamless'];
const MODEL_LBL = { icon_seamless:'DWD ICON', ecmwf_ifs025:'ECMWF', gfs_seamless:'NOAA GFS', meteofrance_seamless:'Météo-France' };
const MODEL_COLOR = { icon_seamless:'var(--accent)', ecmwf_ifs025:'var(--blue)', gfs_seamless:'var(--green)', meteofrance_seamless:'var(--orange)' };
// Dieselben Modellfarben als konkrete Hex-Werte — Canvas kann var(--x) nicht auflösen.
const MODEL_HEX = { icon_seamless:'#f5c842', ecmwf_ifs025:'#6ba3d6', gfs_seamless:'#56d68c', meteofrance_seamless:'#f2994a' };
function hexToRgba(hex,a){
  const n=parseInt(hex.slice(1),16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}
const CACHE_KEY = 'wetter-live-cache-v1';
const FAVS_KEY = 'wetter-favs-v1';
const LASTLOC_KEY = 'wetter-lastloc-v1';

}

// ── Anzeige-Helfer ───────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function roundRectPath(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
// "Jetzt" in der Ortszeit des angezeigten Standorts (utcOffset aus der API);
// ohne Offset (alte Cache-Daten) wird die Gerätezeit verwendet.
function locParts(off){
  if(off==null){const n=new Date();return{y:n.getFullYear(),mo:n.getMonth()+1,d:n.getDate(),h:n.getHours()};}
  const n=new Date(Date.now()+off*1000);
  return{y:n.getUTCFullYear(),mo:n.getUTCMonth()+1,d:n.getUTCDate(),h:n.getUTCHours()};
}
function nowHourISOAt(off){
  const p=locParts(off),pad=x=>String(x).padStart(2,'0');
  return`${p.y}-${pad(p.mo)}-${pad(p.d)}T${pad(p.h)}`;
}
function tempCol(t){return t>=18?'var(--green)':t>=13?'var(--accent)':'var(--orange)';}
function scoreCol(s){return s>=7.5?'var(--green)':s>=4.5?'var(--orange)':'var(--red)';}
function calcScore(max,rain,sun,wind,thunder){
  wind=wind||0;thunder=thunder||0;
  const tS=max>=18&&max<=26?3.0:max>=15?2.0:max>26&&max<=30?1.5:max>=12?1.0:max>30?0.5:max>=8?0.0:-1.0;
  const rS=rain<=5?0.0:rain<=15?-0.5:rain<=25?-1.5:rain<=40?-2.5:rain<=60?-3.5:-5.0;
  const sS=sun>=9?2.5:sun>=7?2.0:sun>=5?1.5:sun>=3?0.5:sun>=1?-0.5:-1.0;
  const wS=wind<=20?0.0:wind<=30?-0.5:wind<=40?-1.0:wind<=55?-1.5:-2.0;
  const thS=thunder<=10?0.0:thunder<=25?-1.0:thunder<=50?-2.5:-4.0;
  return Math.max(0.5,Math.min(9.5,Math.round((5+tS+rS+sS+wS+thS)*10)/10));
}
function makeHourly(hourly24,sunrise,sunset,utcOffset){
  const srH=sunrise?parseInt(sunrise.split(':')[0]):5;
  const srM=sunrise?parseInt(sunrise.split(':')[1]):22;
  const ssH=sunset?parseInt(sunset.split(':')[0]):21;
  const ssM=sunset?parseInt(sunset.split(':')[1]):18;
  function isNightH(h){const t=h*60;return t<srH*60+srM||t>=ssH*60+ssM;}
  const SUN=['☀️','🌤','⛅'];
  const nowHourISO=nowHourISOAt(utcOffset);
  const future=hourly24.filter(c=>c.iso.slice(0,13)>=nowHourISO).slice(0,24);
  if(future.length<6){
    return`<div class="card hourly-card"><div class="hourly-head">⏱ Nächste 24 Stunden</div><div style="padding:20px 22px;font-size:13px;color:var(--orange)">⚠️ Stundendaten veraltet — bitte neu laden (↻).</div></div>`;
  }
  const cells=future.map((cell,i)=>{
    const isNow=i===0,isNight=isNightH(cell.h),isStorm=cell.thunder>40;
    const icon=(isNight&&SUN.includes(cell.icon))?'🌙':cell.icon;
    const rainTxt=cell.rain>0?`💧${cell.rain}%`:`<span style="opacity:.3">💧–</span>`;
    const cls=['h-cell',isNow?'h-now':'',isNight?'h-night':'',isStorm?'h-storm':''].filter(Boolean).join(' ');
    return`<div class="${cls}"><div class="h-lbl">${isNow?'Jetzt':cell.time}</div><span class="h-icon">${icon}</span><div class="h-temp" style="color:${tempCol(cell.temp)}">${cell.temp}°</div><div class="h-rain">${rainTxt}</div>${cell.rainMm>=0.1?`<div class="h-rain">${cell.rainMm}mm</div>`:''}${cell.thunder>25?`<div class="h-thunder">⚡${cell.thunder}%</div>`:''}${cell.wind>30?`<div class="h-wind">🌬${cell.wind}</div>`:''}</div>`;
  });
  return`<div class="card hourly-card"><div class="hourly-head">⏱ Nächste 24 Stunden</div><div class="hourly-scroll"><div class="hourly-inner">${cells.join('')}</div></div></div>`;
}

// Modellvergleich: Regenrisiko, -menge & Wetterlage je Modell nebeneinander.
// Konsens-Zeile nutzt dieselbe lead-time-abhängige Gewichtung wie der Temperaturchart
// (W_NEAR/W_FAR, siehe weightsForDay) — ICON zählt in den ersten 2 Tagen mehr, danach ECMWF.
function renderModelMatrix(fc){
  const activeModels = MODELS.filter(m=>fc.some(r=>r.modelVals&&r.modelVals[m]&&r.modelVals[m].rain!=null));
  if(activeModels.length<2) return '';
  const n=fc.length;
  const head=`<div></div>${fc.map(r=>`<div class="mm-head">${r.wd} ${r.date}</div>`).join('')}`;
  // Konsens zeigt bewusst denselben Regenwert wie Tageskarte/Hero oben (rain: Ensemble-Priorität,
  // sonst gewichteter Modell-Median) — nur die Streuung (rainSpread, reine Modellspanne) ist zusätzlich.
  const konsens=`<div class="mm-row-label konsens">⌀ Konsens</div>${fc.map(r=>{
    const sp=r.rainSpread||0;
    return `<div class="mm-konsens"><span class="mm-pct">${r.rain}%</span>${sp>=15?`<span class="mm-spread">⇅±${Math.round(sp/2)}%</span>`:''}</div>`;
  }).join('')}`;
  const rows=activeModels.map(m=>{
    const label=`<div class="mm-row-label"><span class="mm-dot" style="background:${MODEL_COLOR[m]}"></span>${MODEL_LBL[m]}</div>`;
    const cells=fc.map(r=>{
      const v=r.modelVals&&r.modelVals[m];
      if(!v||v.rain==null) return `<div class="mm-cell">–</div>`;
      const op=Math.min(0.6,(v.rain/100)*0.6).toFixed(2);
      return `<div class="mm-cell" style="background:rgba(107,163,214,${op})">${v.icon||''}<span class="mm-pct">${v.rain}%</span>${v.mm>=0.1?`<span class="mm-mm">${v.mm}mm</span>`:''}</div>`;
    }).join('');
    return label+cells;
  }).join('');
  return `<div class="card model-matrix-card">
    <div class="section-title collapsible" onclick="toggleSection(this,'mm-body')">🌦️ Modellvergleich<span class="chevron">▾</span></div>
    <div class="collapse-body" id="mm-body">
      <div class="mm-scroll"><div class="model-matrix" style="grid-template-columns:78px repeat(${n},minmax(64px,1fr))">
        ${head}${konsens}<div class="mm-sep"></div>${rows}
      </div></div>
      <div class="mm-legend">
        <span><strong style="color:var(--accent)">⌀ Konsens</strong> = Regenwahrscheinlichkeit wie oben in der Tagesübersicht</span>
        <span>⇅ = Streuung zwischen den Modellen (ab 15 Punkten Unterschied)</span>
        <span>Zellfarbe = Regenwahrscheinlichkeit je Modell · mm = erwartete Regenmenge</span>
      </div>
    </div>
  </div>`;
}

// Auf-/Zuklappen von Temperaturchart & Modellvergleich (beide standardmäßig eingeklappt).
// Chart.js misst beim ersten Aufklappen ggf. eine 0-Breite (Canvas war noch nie sichtbar) —
// deshalb hier ein resize() nachschieben, statt uns auf die Erstmessung zu verlassen.
function toggleSection(headEl,bodyId){
  headEl.classList.toggle('open');
  const body=document.getElementById(bodyId);
  body.classList.toggle('open');
  if(bodyId==='chart-body'&&body.classList.contains('open')&&chartInst){
    setTimeout(()=>chartInst.resize(),360);
  }
}

let chartInst=null,lastFc=[],selDay=-1;
function render(data){
  if(chartInst){chartInst.destroy();chartInst=null;}
  selDay=-1;
  const cur=data.current,m=data.meta;
  modelExpectsRain=isRainCode(cur.weatherCode);
  // Client-side filter: immer ab heute (Ortszeit), max 7 Tage — funktioniert auch wenn Daten 1-2 Tage alt sind
  const _p=locParts(m&&m.utcOffset);
  const _todayMid=new Date(_p.y,_p.mo-1,_p.d);
  const fc=data.forecast.filter(r=>{
    const[dv,mv]=r.date.split('.').map(Number);
    const yr=_todayMid.getFullYear();
    const entryDate=new Date(yr,mv-1,dv);
    // Jahreswechsel: falls Monat im Forecast kleiner als aktuell, nächstes Jahr
    if(mv<_todayMid.getMonth()+1-6) entryDate.setFullYear(yr+1);
    return entryDate>=_todayMid;
  }).slice(0,7);
  lastFc=fc;
  const n=fc.length;
  const scores=fc.map(r=>calcScore(r.max,r.rain,r.sun||5,r.wind||0,r.thunder||0));
  const bestI=scores.indexOf(Math.max(...scores));
  const showWarn=data.warning&&data.warning.text;
  const warnSev=data.warning?.severity||'info';
  const thNow=cur.thunder_pct||0,showTh=thNow>25;
  const stat2Val=showTh?`⚡ ${thNow}%`:`💧 ${cur.rain_pct}%`;
  const stat2Lbl=showTh?'Gewitter':'Regen heute';
  const stat2Cls=showTh?'stat-box thunder-stat':'stat-box';
  const uvOk=cur.uv>0;
  const stat3Val=uvOk?`☀️ UV ${cur.uv}`:`💦 ${cur.humidity}%`;
  const stat3Lbl=uvOk?'UV-Index':'Luftfeuchte';

  const htmlTop=`
    ${showWarn?`<div class="warning ${warnSev}"><div style="font-size:22px;line-height:1">⛈</div><div><strong>${esc(data.warning.title)}</strong><p>${esc(data.warning.text)}</p></div></div>`:''}
    <div class="hero">
      <div class="card hero-main">
        <span class="big-icon">${cur.icon}</span>
        <div class="big-temp">${cur.temp}<span class="big-unit">°C</span></div>
        <div class="condition">${cur.condition}</div>
        <div class="feels">Gefühlt ${cur.feelsLike}°C · ${cur.humidity}% Feuchte</div>
        <div><span class="radar-flag" id="radar-flag" style="display:none"></span></div>
      </div>
      <div class="hero-stats">
        <div class="stat-box"><div class="sv">💨 ${cur.wind}</div><div class="sl">km/h ${cur.windDir}</div></div>
        <div class="${stat2Cls}"><div class="sv">${stat2Val}</div><div class="sl">${stat2Lbl}</div></div>
        <div class="stat-box"><div class="sv">${stat3Val}</div><div class="sl">${stat3Lbl}</div></div>
        <div class="stat-box"><div class="sv" style="font-size:15px;line-height:1.45">🌅 ${cur.sunrise}<br>🌇 ${cur.sunset}</div><div class="sl">Sonne</div></div>
      </div>
    </div>
    ${makeHourly(data.hourly24,cur.sunrise,cur.sunset,m&&m.utcOffset)}
    <div class="fc-scroll"><div class="fc-grid" style="grid-template-columns:repeat(${n},minmax(108px,1fr))">
      ${fc.map((r,i)=>{
        const th=r.thunder||0;
        return`<div class="fc-card ${i===0?'today':''} ${i===bestI?'best':''}" onclick="toggleDay(${i})" title="Tagesverlauf anzeigen">
          <div class="fc-day">${r.wd}</div><div class="fc-date">${r.date}</div>
          <span class="fc-icon">${r.icon}</span>
          <div class="fc-max" style="color:${tempCol(r.max)}">${r.max}°</div>
          <div class="fc-min">${r.min}°</div>
          ${(r.spread||0)>=3?`<div class="fc-spread" title="${r.mdetail||''}">⇅ ±${Math.round(r.spread/2)}°</div>`:''}
          <div class="fc-rain">💧 ${r.rain}%${r.rainMm>=0.1?` · ${r.rainMm}mm`:''}</div>
          ${th>25?`<div class="fc-thunder">⚡ ${th}%</div>`:''}
          <div class="fc-sun">☀ ${r.sun}h</div>
          <div class="fc-wind">🌬 ${r.wind}</div>
        </div>`;
      }).join('')}
    </div></div>
    <div class="tap-hint">Tag antippen für Morgens · Mittags · Abends</div>
    <div class="card day-detail" id="day-detail" style="display:none"></div>`;

  const htmlBottom=`
    <div class="card chart-section">
      <div class="section-title collapsible" onclick="toggleSection(this,'chart-body')">🌡️ Temperaturverlauf<span class="chevron">▾</span></div>
      <div class="collapse-body" id="chart-body">
        <div class="chart-wrap"><canvas id="tempChart"></canvas></div>
        <div class="chart-model-legend">
          ${MODELS.filter(m=>fc.some(r=>r.modelVals&&r.modelVals[m]&&(r.modelVals[m].max!=null||r.modelVals[m].min!=null))).map(m=>
            `<span><span class="dot" style="background:${MODEL_COLOR[m]}"></span>${MODEL_LBL[m]}</span>`
          ).join('')}
        </div>
      </div>
    </div>
    ${renderModelMatrix(fc)}
    <div class="card scores-card">
      <div class="section-title">🥾 Outdoor-Score (10 = ideal)</div>
      <div class="score-grid" style="grid-template-columns:repeat(${n},1fr)">
        ${fc.map((r,i)=>{
          const s=scores[i],col=scoreCol(s),h=Math.round((s/10)*56);
          return`<div class="score-item"><div class="score-num" style="color:${col}">${s.toFixed(1)}</div><div class="score-bwrap"><div class="score-bar" style="height:${h}px;background:${col}"></div></div><div class="score-lbl">${r.wd}</div></div>`;
        }).join('')}
      </div>
    </div>
    <div class="card verdict">
      <h3>🎯 Wochenausblick</h3>
      <p>Heute <strong>${cur.condition}</strong>, ${cur.temp}°C. Bester Outdoor-Tag: <strong>${fc[bestI].wd} (${fc[bestI].date})</strong> mit ${fc[bestI].max}°C und ${fc[bestI].sun}h Sonne.</p>
      <div class="hl-box">${fc[bestI].icon} ${fc[bestI].wd} · ${fc[bestI].max}°C · ☀ ${fc[bestI].sun}h · 💧${fc[bestI].rain}%${(fc[bestI].thunder||0)>25?' · ⚡'+fc[bestI].thunder+'%':''}</div>
    </div>
    <div class="footer">
      Daten: Open-Meteo API (CC BY 4.0) · ${m.source} · Stand ${m.ts} ${m.ts_time} Uhr ·
      <a href="https://open-meteo.com" target="_blank">Open-Meteo ↗</a> ·
      <a href="https://www.dwd.de/DE/wetter/warnungen_gemeinden/warnWetter_node.html" target="_blank">DWD-Warnungen ↗</a>
    </div>`;

  document.getElementById('content-top').innerHTML=htmlTop;
  document.getElementById('content-bottom').innerHTML=htmlBottom;
  setTimeout(()=>{
    const ctx=document.getElementById('tempChart');
    if(!ctx)return;
    // Einzelmodell-Linien: je Modell in dessen eigener Farbe (wie im Modellvergleich),
    // damit jeder Punkt beim Hovern einem Modell zuordenbar ist. Linie selbst bleibt
    // gedämpft, damit der Chart in Ruhe nicht überladen wirkt — die Punktfarbe ist voll
    // gesättigt und liefert zusammen mit der Legende unter dem Chart die Zuordnung.
    const modelDatasets=[];
    MODELS.forEach(m=>{
      const hex=MODEL_HEX[m];
      const maxArr=fc.map(r=>r.modelVals&&r.modelVals[m]&&r.modelVals[m].max!=null?r.modelVals[m].max:null);
      const minArr=fc.map(r=>r.modelVals&&r.modelVals[m]&&r.modelVals[m].min!=null?r.modelVals[m].min:null);
      if(maxArr.some(v=>v!=null)) modelDatasets.push({label:`${MODEL_LBL[m]} Max`,_model:m,data:maxArr,borderColor:hexToRgba(hex,.4),backgroundColor:'transparent',borderWidth:1,pointRadius:2,pointHoverRadius:4,pointBackgroundColor:hex,pointHoverBackgroundColor:hex,tension:0.4,spanGaps:true});
      if(minArr.some(v=>v!=null)) modelDatasets.push({label:`${MODEL_LBL[m]} Min`,_model:m,data:minArr,borderColor:hexToRgba(hex,.4),backgroundColor:'transparent',borderWidth:1,pointRadius:2,pointHoverRadius:4,pointBackgroundColor:hex,pointHoverBackgroundColor:hex,tension:0.4,spanGaps:true});
    });
    // Ersetzt die Standard-Tooltip-Box durch Beschriftungen direkt an jedem aktiven
    // Punkt (Konsens + je Modell), vertikal sortiert wie die Kurven verlaufen und
    // per dünner Linie in der jeweiligen Farbe mit ihrem Punkt verbunden. Konsens
    // (Max/Min) etwas größer & fett — das ist die Hauptaussage, Modellwerte sind
    // die kleineren Detail-Labels darunter/darüber.
    function resolveDsColor(ds,idx){
      const c=ds.pointBackgroundColor;
      return Array.isArray(c)?c[idx]:c;
    }
    const pointLabelPlugin={
      id:'pointLabels',
      afterDatasetsDraw(chart){
        const active=chart.getActiveElements().filter(a=>{
          const val=chart.data.datasets[a.datasetIndex].data[a.index];
          return val!=null&&Number.isFinite(a.element.y);
        });
        if(!active.length) return;
        const {ctx,chartArea:area}=chart;
        const hoverX=active[0].element.x;
        ctx.save();
        ctx.strokeStyle='rgba(255,255,255,.14)';
        ctx.lineWidth=1;
        ctx.setLineDash([3,3]);
        ctx.beginPath();ctx.moveTo(hoverX,area.top);ctx.lineTo(hoverX,area.bottom);ctx.stroke();
        ctx.setLineDash([]);

        const items=active.map(a=>{
          const ds=chart.data.datasets[a.datasetIndex];
          const primary=ds.label==='Max °C'||ds.label==='Min °C';
          return {px:a.element.x,py:a.element.y,val:ds.data[a.index],color:resolveDsColor(ds,a.index),primary};
        }).sort((p,q)=>p.py-q.py); // oben zuerst = wie die Kurven verlaufen

        const onRight=hoverX<area.right-76;
        const gap=14;
        let prevEdge=null;
        items.forEach(it=>{
          const boxH=it.primary?19:15;
          const lx=onRight?it.px+gap:it.px-gap;
          let ly=it.py;
          if(prevEdge!=null&&ly<prevEdge+boxH/2) ly=prevEdge+boxH/2;
          prevEdge=ly+boxH/2;

          ctx.beginPath();
          ctx.strokeStyle=it.color;ctx.globalAlpha=it.primary?.65:.45;ctx.lineWidth=1;
          ctx.moveTo(it.px,it.py);ctx.lineTo(lx,ly);ctx.stroke();
          ctx.globalAlpha=1;

          const text=`${Math.round(it.val)}°`;
          ctx.font=(it.primary?'600 12px':'500 10.5px')+' Outfit, sans-serif';
          const tw=ctx.measureText(text).width;
          const boxW=tw+(it.primary?14:10);
          const bx=onRight?lx:lx-boxW;
          const by=ly-boxH/2;
          ctx.fillStyle=it.primary?'rgba(10,20,32,.92)':'rgba(10,20,32,.78)';
          ctx.strokeStyle=it.color;ctx.lineWidth=1;
          roundRectPath(ctx,bx,by,boxW,boxH,6);
          ctx.fill();ctx.stroke();
          ctx.fillStyle=it.color;
          ctx.textBaseline='middle';ctx.textAlign='center';
          ctx.fillText(text,bx+boxW/2,by+boxH/2+0.5);
        });
        ctx.restore();
      }
    };
    chartInst=new Chart(ctx,{
      type:'line',
      data:{
        labels:fc.map(r=>r.wd+' '+r.date),
        datasets:[
          ...modelDatasets,
          {label:'Max °C',data:fc.map(r=>r.max),borderColor:'#f5c842',backgroundColor:'rgba(245,200,66,.12)',fill:true,tension:0.4,borderWidth:3,
           pointBackgroundColor:fc.map((_,i)=>i===bestI?'#56d68c':'#f5c842'),
           pointRadius:fc.map((_,i)=>i===bestI?8:5)},
          {label:'Min °C',data:fc.map(r=>r.min),borderColor:'#6ba3d6',backgroundColor:'rgba(107,163,214,.06)',fill:false,tension:0.4,borderWidth:3,pointBackgroundColor:'#6ba3d6',pointRadius:4}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
        plugins:{legend:{labels:{color:'#8ba0b8',font:{family:'Outfit',size:12},
          filter:item=>item.text==='Max °C'||item.text==='Min °C'}},
          tooltip:{enabled:false}},
        scales:{
          x:{ticks:{color:'#8ba0b8',font:{family:'Outfit',size:11}},grid:{color:'rgba(255,255,255,.05)'}},
          y:{ticks:{color:'#8ba0b8',font:{family:'Outfit'},stepSize:5,callback:v=>v+'°'},grid:{color:'rgba(255,255,255,.05)'}}
        }
      },
      plugins:[pointLabelPlugin]
    });
  },80);
}

// ── Double-check: läuft nach render(), prüft alle angezeigten Werte ──────────
function doubleCheck(data) {
  const issues = [];
  const p = locParts(data.meta && data.meta.utcOffset);
  const nowHourISO = nowHourISOAt(data.meta && data.meta.utcOffset);

  // Stundenwerte: nur die tatsächlich angezeigten (Zukunft)
  const future = (data.hourly24 || []).filter(c => c.iso.slice(0,13) >= nowHourISO).slice(0, 24);

  // — Stündlich —
  future.forEach(c => {
    if (c.temp < -20 || c.temp > 50)
      issues.push(`Stunde ${c.time}: Temperatur ${c.temp}°C außerhalb plausiblem Bereich (-20 … 50°C)`);
    if (c.rain < 0 || c.rain > 100)
      issues.push(`Stunde ${c.time}: Regenwahrscheinlichkeit ${c.rain}% ungültig (0–100%)`);
    if (c.wind < 0 || c.wind > 250)
      issues.push(`Stunde ${c.time}: Wind ${c.wind} km/h unplausibel`);
    if (c.thunder > 0 && c.rain < 5)
      issues.push(`Stunde ${c.time}: Gewitter ${c.thunder}% aber Regenrisiko nur ${c.rain}% — inkonsistent`);
  });

  // Chronologische Reihenfolge der Stunden
  for (let i = 1; i < future.length; i++) {
    if (future[i].iso <= future[i-1].iso)
      issues.push(`Stundenreihenfolge fehlerhaft: ${future[i-1].iso} → ${future[i].iso}`);
  }

  // — 7-Tage-Forecast —
  const fc = data.forecast || [];
  fc.forEach(r => {
    if (r.max < r.min)
      issues.push(`${r.wd} ${r.date}: Max (${r.max}°) < Min (${r.min}°) — unmöglich`);
    if (r.max < -20 || r.max > 50)
      issues.push(`${r.wd} ${r.date}: Max-Temperatur ${r.max}°C unplausibel`);
    if (r.min < -30 || r.min > 40)
      issues.push(`${r.wd} ${r.date}: Min-Temperatur ${r.min}°C unplausibel`);
    if (r.rain < 0 || r.rain > 100)
      issues.push(`${r.wd} ${r.date}: Regenrisiko ${r.rain}% ungültig`);
    if (r.thunder < 0 || r.thunder > 100)
      issues.push(`${r.wd} ${r.date}: Gewitterrisiko ${r.thunder}% ungültig`);
    if (r.sun < 0 || r.sun > 18)
      issues.push(`${r.wd} ${r.date}: Sonnenstunden ${r.sun}h unplausibel (0–18h)`);
    if (r.wind < 0 || r.wind > 250)
      issues.push(`${r.wd} ${r.date}: Wind ${r.wind} km/h unplausibel`);
    if ((r.thunder || 0) > 25 && r.rain < 10)
      issues.push(`${r.wd} ${r.date}: Gewitter ${r.thunder}% aber Regenrisiko nur ${r.rain}% — inkonsistent`);
  });

  // Datumslücken / Reihenfolge
  for (let i = 1; i < fc.length; i++) {
    const [d1,m1] = fc[i-1].date.split('.').map(Number);
    const [d2,m2] = fc[i].date.split('.').map(Number);
    const yr = p.y;
    const diff = (new Date(yr,m2-1,d2) - new Date(yr,m1-1,d1)) / 86400000;
    if (diff !== 1)
      issues.push(`Datumslücke: ${fc[i-1].date} → ${fc[i].date} (${diff} Tage statt 1)`);
  }

  // Erster Forecast-Tag darf nicht in der Vergangenheit liegen
  if (fc.length > 0) {
    const [d0,m0] = fc[0].date.split('.').map(Number);
    const firstDate = new Date(p.y, m0-1, d0);
    const today = new Date(p.y, p.mo-1, p.d);
    if (firstDate < today)
      issues.push(`Forecast beginnt mit vergangenem Datum: ${fc[0].date} — Daten veraltet`);
  }

  // Anzahl angezeigte Stunden
  if (future.length < 12)
    issues.push(`Nur ${future.length} Stunden verfügbar — Daten veraltet, bitte neu laden`);

  return issues;
}

  document.querySelectorAll('.fc-card').forEach((c,ci)=>c.classList.toggle('sel',ci===i));

  el.style.display='block';

// ── WMO-Wettercodes ──────────────────────────────────────────────────────────
const WMO_MAP = {
  0:["☀️","Klar"],1:["🌤","Überwiegend klar"],2:["⛅","Wechselnd bewölkt"],3:["☁️","Bedeckt"],
  45:["🌫","Nebel"],48:["🌫","Gefrierender Nebel"],
  51:["🌦","Leichter Nieselregen"],53:["🌦","Nieselregen"],55:["🌦","Starker Nieselregen"],
  61:["🌧","Leichter Regen"],63:["🌧","Mäßiger Regen"],65:["🌧","Starker Regen"],
  71:["❄️","Leichter Schneefall"],73:["❄️","Mäßiger Schneefall"],75:["❄️","Starker Schneefall"],
  77:["🌨","Schneekörner"],
  80:["🌦","Leichte Schauer"],81:["🌧","Mäßige Schauer"],82:["🌧","Starke Schauer"],
  85:["🌨","Leichte Schneeschauer"],86:["🌨","Starke Schneeschauer"],
  95:["⛈","Gewitter"],96:["⛈","Gewitter mit Hagel"],99:["⛈","Schweres Gewitter"]
};
function wmoIcon(code){
  const c = Math.round(code||0);
  if (WMO_MAP[c]) return WMO_MAP[c];
  if (c<=2) return ["🌤","Überwiegend klar"];
  if (c<=9) return ["☁️","Bewölkt"];
  if (c<=49) return ["🌫","Nebel"];
  if (c<=59) return ["🌦","Nieselregen"];
  if (c<=69) return ["🌧","Regen"];
  if (c<=79) return ["❄️","Schneefall"];
  if (c<=84) return ["🌧","Schauer"];
  if (c<=89) return ["🌨","Schneeschauer"];
  return ["⛈","Gewitter"];
}
// Tagescharakter aus Stunden-Codes: Gewitter schlägt alles, Niederschlag ab 2 Stunden,
// Nebel nur wenn er mehr als die Hälfte des Fensters dominiert (sonst zählt er als bedeckt) —
// verhindert, dass Morgennebel einen sonnigen Tag als 🌫 anzeigt (daily.weather_code-Eigenheit).
function modeOf(arr){
  const cnt={};let best=arr[0],bn=0;
  for(const c of arr){cnt[c]=(cnt[c]||0)+1;const n=cnt[c];if(n>bn||(n===bn&&c>best)){bn=n;best=c;}}
  return best;
}
function pickDayCode(codes){
  if(!codes.length) return null;
  const sev=codes.filter(c=>c>=95);
  if(sev.length) return Math.max(...sev);
  const isPrec=c=>(c>=51&&c<=86)||c===77;
  const prec=codes.filter(isPrec);
  if(prec.length>=2) return modeOf(prec);
  const fog=codes.filter(c=>c===45||c===48);
  if(fog.length>codes.length/2) return modeOf(fog);
  const rest=codes.map(c=>(c===45||c===48)?3:c).filter(c=>!isPrec(c));
  return modeOf(rest.length?rest:codes);
}
function thunderPct(code){
  const c = Math.round(code||0);
  if (c>=99) return 90;
  if (c>=96) return 75;
  if (c>=95) return 60;
  return 0;
}
function windDirLbl(deg){
  const dirs=['N','NO','O','SO','S','SW','W','NW'];
  return dirs[Math.round((deg||0)/45)%8];
}
const WD_LBL=['Mo','Di','Mi','Do','Fr','Sa','So'];

// ── Multi-Modell-Konsens ─────────────────────────────────────────────────────
function modelPairs(obj,base,i){
  const out=[];
  for(const m of MODELS){
    const v=obj?.[base+'_'+m]?.[i];
    if(v!=null&&isFinite(v)) out.push([m,v]);
  }
  return out;
}
// Lead-time-abhängige Gewichte: nah dran zählt ICON-D2-Auflösung mehr,
// ab Tag 3 verliert ICON an Reichweite und ECMWF (bestes Modell im Mittelfrist-Bereich) übernimmt.
const W_NEAR = { icon_seamless:0.40, ecmwf_ifs025:0.30, gfs_seamless:0.15, meteofrance_seamless:0.15 }; // 0-48h
const W_FAR  = { icon_seamless:0.20, ecmwf_ifs025:0.45, gfs_seamless:0.20, meteofrance_seamless:0.15 }; // >48h
function weightsForHour(hoursAhead){ return hoursAhead<=48 ? W_NEAR : W_FAR; }
function weightsForDay(dayIndex){ return dayIndex<=1 ? W_NEAR : W_FAR; }
function weightedMedian(pairs, weights){
  const items = pairs.filter(([,v])=>v!=null&&isFinite(v)).map(([m,v])=>({v,w:weights[m]??0.25}));
  if(!items.length) return null;
  items.sort((a,b)=>a.v-b.v);
  const total = items.reduce((s,it)=>s+it.w,0);
  let cum=0;
  for(const it of items){ cum+=it.w; if(cum>=total/2) return it.v; }
  return items[items.length-1].v;
}
// Ensemble → Regenwahrscheinlichkeit: Anteil der Member mit ≥0,1 mm in der Stunde.
// Liefert {isoZeit: prozent} oder null, wenn die Ensemble-Antwort unbrauchbar ist.
function buildEnsRain(rawE){
  if(!rawE||!rawE.hourly||!rawE.hourly.time) return null;
  const h=rawE.hourly;
  const members=Object.keys(h).filter(k=>k.indexOf('precipitation')===0);
  if(members.length<10) return null;
  const map={};
  h.time.forEach((t,i)=>{
    let wet=0,n=0;
    for(const m of members){const v=h[m][i];if(v!=null){n++;if(v>=0.1)wet++;}}
    if(n>0) map[t]=Math.round(100*wet/n);
  });
  map.__members=members.length;
  return map;
}
// Icon ↔ Regenrisiko abgleichen: trockenes Icon bei hohem Risiko anheben,
// Regen-Icon bei sehr geringem Risiko absenken (Gewitter bleibt unangetastet)
function reconcileCode(code,rainPct){
  if(code==null||rainPct==null) return code;
  const dry=code<=48;
  if(rainPct>=50&&dry) return 80;
  if(rainPct<15&&!dry&&code<95) return 3;
  return code;
}

// Wandelt die Open-Meteo-Antworten in das Anzeigeformat um.
// raw = best_match-Abruf (alle Variablen), rawM = Multi-Modell-Abruf (optional),
// ensRain = Stunden-Regenwahrscheinlichkeit aus dem ICON-EPS-Ensemble (optional).
function buildWeatherData(raw, rawM, ensRain){
  const cur = raw.current;
  const [ico,cond] = wmoIcon(cur.weather_code);
  const sunrise = raw.daily.sunrise[0].slice(11,16);
  const sunset = raw.daily.sunset[0].slice(11,16);

  // Index-Maps für den Multi-Modell-Abruf (Zeitachsen können theoretisch abweichen)
  const mDayIdx = {}, mHourIdx = {};
  if (rawM && rawM.daily && rawM.hourly) {
    rawM.daily.time.forEach((t,i)=>mDayIdx[t]=i);
    rawM.hourly.time.forEach((t,i)=>mHourIdx[t]=i);
  }
  const activeModels = rawM ? MODELS.filter(m=>rawM.daily?.['temperature_2m_max_'+m]?.some(v=>v!=null)) : [];

  const current = {
    temp: Math.round(cur.temperature_2m),
    feelsLike: Math.round(cur.apparent_temperature),
    icon: ico, condition: cond, weatherCode: cur.weather_code,
    wind: Math.round(cur.wind_speed_10m),
    windDir: windDirLbl(cur.wind_direction_10m),
    rain_pct: raw.daily.precipitation_probability_max[0] || 0,
    thunder_pct: thunderPct(cur.weather_code),
    humidity: Math.round(cur.relative_humidity_2m),
    uv: Math.round(cur.uv_index || 0),
    sunrise, sunset
  };

  const nowIsoT = cur.time;
  const htimes = raw.hourly.time;
  let si = htimes.findIndex(t=>t>=nowIsoT);
  if (si<0) si=0;
  const hourly24=[];
  for(let i=0;i<24;i++){
    const idx=si+i;
    if(idx>=htimes.length) break;
    const t=htimes[idx];
    const [ic] = wmoIcon(raw.hourly.weather_code[idx]);
    let temp = raw.hourly.temperature_2m[idx];
    let rain = raw.hourly.precipitation_probability[idx] || 0;
    const mi = mHourIdx[t];
    if (mi!=null) {
      const w = weightsForHour(i);
      const tp = modelPairs(rawM.hourly,'temperature_2m',mi);
      if (tp.length>=2) temp = weightedMedian(tp,w);
      const rp = modelPairs(rawM.hourly,'precipitation_probability',mi);
      if (rp.length>=2) rain = weightedMedian(rp,w);
    }
    if (ensRain && ensRain[t]!=null) rain = ensRain[t];
    hourly24.push({
      iso:t, h:parseInt(t.slice(11,13)), time:t.slice(11,16),
      temp:Math.round(temp),
      rain:Math.round(rain),
      rainMm:Math.round((raw.hourly.precipitation[idx]||0)*10)/10,
      thunder: thunderPct(raw.hourly.weather_code[idx]),
      snow:0, wind:Math.round(raw.hourly.wind_speed_10m[idx]), icon:ic
    });
  }

  // Stunden-Indizes pro Kalendertag (für Tagescharakter + Morgens/Mittags/Abends)
  const dayHours={};
  htimes.forEach((t,idx)=>{const ds=t.slice(0,10);(dayHours[ds]=dayHours[ds]||[]).push(idx);});
  const hourAt=ix=>+htimes[ix].slice(11,13);
  // Stundenwert mit Multi-Modell-Median (falls verfügbar)
  function hConsensus(ix,base,fallback){
    const mi2=mHourIdx[htimes[ix]];
    if(mi2!=null){
      const pairs=modelPairs(rawM.hourly,base,mi2);
      if(pairs.length>=2) return weightedMedian(pairs, weightsForHour(ix-si));
    }
    return fallback;
  }

  const forecast=[];
  raw.daily.time.forEach((ds,i)=>{
    const dt=new Date(ds+'T00:00:00');
    const hIdxs=dayHours[ds]||[];
    // Tages-Icon aus dem Fenster 9–18 Uhr statt daily.weather_code (Morgennebel-Problem)
    const dayCodes=hIdxs.filter(ix=>hourAt(ix)>=9&&hourAt(ix)<=18).map(ix=>raw.hourly.weather_code[ix]);
    const dCode0=pickDayCode(dayCodes);
    const thunderDay=hIdxs.length
      ? Math.max(...hIdxs.map(ix=>thunderPct(raw.hourly.weather_code[ix])))
      : thunderPct(raw.daily.weather_code[i]);
    // Tagesabschnitte
    const parts=[['Morgens',6,11],['Mittags',12,17],['Abends',18,23]].map(([lbl,h1,h2])=>{
      const ixs=hIdxs.filter(ix=>hourAt(ix)>=h1&&hourAt(ix)<=h2);
      if(!ixs.length) return null;
      const codes=ixs.map(ix=>raw.hourly.weather_code[ix]);
      const temps=ixs.map(ix=>hConsensus(ix,'temperature_2m',raw.hourly.temperature_2m[ix]));
      const rains=ixs.map(ix=>hConsensus(ix,'precipitation_probability',raw.hourly.precipitation_probability[ix]||0));
      const ensSeg=ixs.map(ix=>ensRain?ensRain[htimes[ix]]:null).filter(v=>v!=null);
      const segRain=ensSeg.length?Math.max(...ensSeg):Math.round(Math.max(...rains));
      const [pic,pco]=wmoIcon(reconcileCode(pickDayCode(codes),segRain));
      const winds=ixs.map(ix=>raw.hourly.wind_speed_10m[ix]||0);
      const segRainMm=Math.round(ixs.reduce((s,ix)=>s+(raw.hourly.precipitation[ix]||0),0)*10)/10;
      return {lbl,icon:pic,cond:pco,
        tmin:Math.round(Math.min(...temps)),tmax:Math.round(Math.max(...temps)),
        rain:segRain,rainMm:segRainMm,wind:Math.round(Math.max(...winds)),
        thunder:Math.max(...codes.map(thunderPct))};
    }).filter(Boolean);
    const dy=ds.slice(8,10), mo=ds.slice(5,7);
    const sunH=Math.round((raw.daily.sunshine_duration[i]||0)/360)/10;
    let tmax = raw.daily.temperature_2m_max[i];
    let tmin = raw.daily.temperature_2m_min[i];
    let rain = raw.daily.precipitation_probability_max[i] || 0;
    let spread = 0, mdetail = '', modelVals = {};
    let rainModelWeighted = null, rainSpread = 0;
    const mi = mDayIdx[ds];
    if (mi!=null) {
      const w = weightsForDay(i);
      const pMax = modelPairs(rawM.daily,'temperature_2m_max',mi);
      const pMin = modelPairs(rawM.daily,'temperature_2m_min',mi);
      const pRain = modelPairs(rawM.daily,'precipitation_probability_max',mi);
      const pMm = modelPairs(rawM.daily,'precipitation_sum',mi);
      const pCode = modelPairs(rawM.daily,'weather_code',mi);
      if (pMax.length>=2) {
        const vals=pMax.map(p=>p[1]);
        tmax = weightedMedian(pMax,w);
        spread = Math.round(Math.max(...vals)-Math.min(...vals));
        mdetail = pMax.map(([m,v])=>`${MODEL_LBL[m]} ${Math.round(v)}°`).join(' · ');
      }
      if (pMin.length>=2) tmin = weightedMedian(pMin,w);
      if (pRain.length>=2) {
        rain = weightedMedian(pRain,w);
        rainModelWeighted = Math.round(rain);
        const rvals=pRain.map(p=>p[1]);
        rainSpread = Math.round(Math.max(...rvals)-Math.min(...rvals));
      }
      // Einzelwerte je Modell für Temperaturchart & Modellvergleich (Max, Min, Regen%, mm, Icon)
      pMax.forEach(([m,v])=>{ modelVals[m]=modelVals[m]||{}; modelVals[m].max=Math.round(v); });
      pMin.forEach(([m,v])=>{ modelVals[m]=modelVals[m]||{}; modelVals[m].min=Math.round(v); });
      pRain.forEach(([m,v])=>{ modelVals[m]=modelVals[m]||{}; modelVals[m].rain=Math.round(v); });
      pMm.forEach(([m,v])=>{ modelVals[m]=modelVals[m]||{}; modelVals[m].mm=Math.round(v*10)/10; });
      pCode.forEach(([m,v])=>{
        modelVals[m]=modelVals[m]||{};
        const mRain = modelVals[m].rain!=null ? modelVals[m].rain : rain;
        const [mic,mco] = wmoIcon(reconcileCode(v, mRain));
        modelVals[m].icon = mic; modelVals[m].cond = mco;
      });
    }
    // Ensemble schlägt Modell-Median beim Regenrisiko (Tagesmaximum der Stundenwerte)
    const ensDay=hIdxs.map(ix=>ensRain?ensRain[htimes[ix]]:null).filter(v=>v!=null);
    if (ensDay.length>=12) rain=Math.max(...ensDay);
    const [ic,co]=wmoIcon(reconcileCode(dCode0!=null?dCode0:raw.daily.weather_code[i], rain));
    forecast.push({
      date:`${dy}.${mo}`, wd:WD_LBL[(dt.getDay()+6)%7],
      icon:ic, max:Math.round(tmax),
      min:Math.round(tmin), cond:co,
      rain:Math.round(rain),
      rainMm: Math.round((raw.daily.precipitation_sum[i]||0)*10)/10,
      thunder: thunderDay,
      snow:0, sun:sunH,
      wind: Math.round(raw.daily.wind_speed_10m_max[i] || 0),
      spread, mdetail, parts, modelVals, rainModelWeighted, rainSpread
    });
  });

  const now = new Date();
  const pad=n=>String(n).padStart(2,'0');
  if (forecast.length) current.rain_pct = forecast[0].rain;
  return {
    current, warning:null, hourly24, forecast,
    meta:{
      source: (activeModels.length>1
        ? `Konsens aus ${activeModels.length} Modellen: ${activeModels.map(m=>MODEL_LBL[m]).join(' · ')}`
        : 'Open-Meteo best match')
        + (ensRain?` · Regenrisiko: ICON-EPS-Ensemble (${ensRain.__members} Member)`:''),
      nModels: activeModels.length,
      utcOffset: raw.utc_offset_seconds,
      ts:`${pad(now.getDate())}.${pad(now.getMonth()+1)}.${now.getFullYear()}`,
      ts_time:`${pad(now.getHours())}:${pad(now.getMinutes())}`,
      fetched_iso: now.toISOString().slice(0,16)
    }
  };
}

// ── Standort ─────────────────────────────────────────────────────────────────
function getPosition(){
  return new Promise(res=>{
    if(!('geolocation' in navigator)) return res(null);
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude, lon:p.coords.longitude}),
      ()=>res(null),
      {enableHighAccuracy:false, timeout:8000, maximumAge:600000}
    );
  });
}
async function fetchLocationName(lat,lon){
  try{
    const r=await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=de`);
    if(!r.ok) return null;
    const j=await r.json();
    return {name:j.city||j.locality||j.principalSubdivision||null, region:j.principalSubdivision||''};
  }catch(e){return null;}
}

// ── Wetterwarnungen: DWD (via Bright Sky) + GeoSphere Österreich ─────────────
async function fetchWarnings(lat,lon){
  const out=[];
  try{
    const r=await fetch(`https://api.brightsky.dev/alerts?lat=${lat}&lon=${lon}`);
    if(r.ok){
      const j=await r.json();
      (j.alerts||[]).forEach(a=>out.push({
        title:a.headline_de||a.event_de||'Wetterwarnung (DWD)',
        text:(a.description_de||'').slice(0,300),
        severity:(a.severity==='severe'||a.severity==='extreme')?'danger':'info'
      }));
    }
  }catch(e){}
  // Österreich (grobe Bounding Box) zusätzlich über GeoSphere/ZAMG
  if(lat>=46.3&&lat<=49.1&&lon>=9.5&&lon<=17.2){
    try{
      const r=await fetch(`https://warnungen.zamg.at/wsapp/api/getWarningsForCoords?lon=${lon}&lat=${lat}&lang=de`);
      if(r.ok){
        const j=await r.json();
        (j?.properties?.warnings||[]).forEach(w=>{
          const p=w.properties||w;
          out.push({
            title:p.text||p.type||'Wetterwarnung (GeoSphere)',
            text:String(p.auswirkungen||p.meteotext||'').slice(0,300),
            severity:(+(p.warnstufeid||p.rawinfo?.wlevel||0)>=3)?'danger':'info'
          });
        });
      }
    }catch(e){}
  }
  return out;
}

// ── Regenradar (RainViewer) ──────────────────────────────────────────────────
let radarMap=null, radarLayer=null, radarMarker=null;
let radarFrames=[], radarPastLen=0, radarIndex=0, radarPlaying=false, radarTimer=null, radarHost='';
let radarLoc=null, radarSampleCanvas=null, radarSampleCtx=null, radarSampleSeq=0;

function initRadar(){
  if(typeof L==='undefined'||radarMap)return;
  radarMap=L.map('radar-map',{attributionControl:true,zoomControl:true,scrollWheelZoom:false})
    .setView([FALLBACK.lat,FALLBACK.lon],7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    subdomains:'abcd',maxZoom:19,attribution:'© OpenStreetMap, © CARTO'
  }).addTo(radarMap);
  radarMarker=L.circleMarker([FALLBACK.lat,FALLBACK.lon],{radius:6,color:'#f5c842',weight:2,fillColor:'#f5c842',fillOpacity:.9}).addTo(radarMap);
  radarLoc={lat:FALLBACK.lat,lon:FALLBACK.lon};
  fetchRadarFrames();
}
function radarSetCenter(lat,lon){
  if(!radarMap)return;
  radarMap.setView([lat,lon],radarMap.getZoom()||7);
  if(radarMarker)radarMarker.setLatLng([lat,lon]);
  radarLoc={lat,lon};
  radarSampleAtLocation();
}
function radarTileCoords(lat,lon,z){
  const n=Math.pow(2,z);
  const x=(lon+180)/360*n;
  const rad=lat*Math.PI/180;
  const y=(1-Math.log(Math.tan(rad)+1/Math.cos(rad))/Math.PI)/2*n;
  return{tx:Math.floor(x),ty:Math.floor(y),px:Math.floor((x-Math.floor(x))*256),py:Math.floor((y-Math.floor(y))*256)};
}
function radarClassifyPixel(d){
  const[r,g,b,a]=d;
  if(a<25)return null;
  if(r>150&&g<150)return{level:'stark',label:'kräftiger Regen'};
  if(g>140&&b<150)return{level:'mittel',label:'mäßiger Regen'};
  return{level:'leicht',label:'leichter Regen'};
}
function radarSetFlag(info){
  const el=document.getElementById('radar-flag');
  if(!el)return;
  if(!info){
    if(modelExpectsRain){
      el.style.display='inline-flex';
      el.textContent='📡 Laut Radar: Kein Regen';
      el.className='radar-flag keins';
    }else{
      el.style.display='none';
      el.className='radar-flag';
    }
    return;
  }
  el.style.display='inline-flex';
  el.textContent=`📡 Laut Radar: ${info.label}`;
  el.className='radar-flag '+info.level;
}
function radarSampleAtLocation(){
  // Sampelt bewusst immer den "Jetzt"-Referenzframe (letzter Vergangenheits-Frame),
  // unabhängig davon, welchen Zeitpunkt der Slider gerade anzeigt — das Badge im
  // aktuellen Wetterstatus soll nicht durch Zurückspulen auf der Zeitleiste verfälscht werden.
  if(!radarLoc||!radarFrames.length||!radarHost){radarSetFlag(null);return;}
  const frame=radarFrames[radarPastLen-1];
  if(!frame)return;
  const z=7;
  const{tx,ty,px,py}=radarTileCoords(radarLoc.lat,radarLoc.lon,z);
  const url=`${radarHost}${frame.path}/256/${z}/${tx}/${ty}/2/1_1.png`;
  const seq=++radarSampleSeq;
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>{
    if(seq!==radarSampleSeq)return;
    if(!radarSampleCanvas){
      radarSampleCanvas=document.createElement('canvas');
      radarSampleCanvas.width=256;radarSampleCanvas.height=256;
      radarSampleCtx=radarSampleCanvas.getContext('2d');
    }
    radarSampleCtx.clearRect(0,0,256,256);
    radarSampleCtx.drawImage(img,0,0);
    try{
      const d=radarSampleCtx.getImageData(px,py,1,1).data;
      radarSetFlag(radarClassifyPixel(d));
    }catch(e){radarSetFlag(null);}
  };
  img.onerror=()=>{if(seq===radarSampleSeq)radarSetFlag(null);};
  img.src=url;
}
async function fetchRadarFrames(){
  if(!radarMap)return;
  try{
    const r=await fetch('https://api.rainviewer.com/public/weather-maps.json');
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    radarHost=j.host;
    radarFrames=[...(j.radar?.past||[]),...(j.radar?.nowcast||[])];
    radarPastLen=(j.radar?.past||[]).length;
    if(!radarFrames.length)throw new Error('Keine Radardaten verfügbar');
    radarIndex=radarPastLen-1;
    const slider=document.getElementById('radar-slider');
    slider.max=radarFrames.length-1;
    slider.value=radarIndex;
    radarBuildTicks();
    radarRenderFrame(radarIndex);
    radarSampleAtLocation();
    const futureSteps=radarFrames.length-radarPastLen;
    const futureMin=futureSteps*radarFrameStepMin();
    document.getElementById('radar-note').textContent=futureSteps>0
      ? `Vergangene ~2 Std. + ${futureMin} Min. Kurzfrist-Prognose (RainViewer) — Prognose ist kein garantierter Teil der kostenlosen API, Verlässlichkeit nimmt Richtung Prognose-Ende ab.`
      : 'Vergangene ~2 Std. (RainViewer). Eine Kurzfrist-Prognose ist kein garantierter Teil der kostenlosen API und wird nur angezeigt, wenn RainViewer gerade welche berechnet hat.';
  }catch(e){
    document.getElementById('radar-time').textContent='Radar nicht verfügbar';
    document.getElementById('radar-note').textContent='Radardaten konnten nicht geladen werden.';
  }
}
function radarFrameStepMin(){
  if(radarFrames.length<2)return 10;
  return Math.round((radarFrames[1].time-radarFrames[0].time)/60)||10;
}
function radarBuildTicks(){
  const wrap=document.getElementById('radar-ticks');
  const n=radarFrames.length;
  if(n<2){wrap.innerHTML='';return;}
  let html='';
  radarFrames.forEach((f,i)=>{
    const pct=(i/(n-1))*100;
    const isNow=i===radarPastLen-1;
    const d=new Date(f.time*1000);
    const isHour=d.getMinutes()<10;
    if(isNow){
      html+=`<div class="radar-tick now" style="left:${pct}%"></div><div class="radar-tick-label now" style="left:${pct}%">Jetzt</div>`;
    }else if(isHour){
      const lbl=d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
      html+=`<div class="radar-tick hour" style="left:${pct}%"></div><div class="radar-tick-label" style="left:${pct}%">${lbl}</div>`;
    }else{
      html+=`<div class="radar-tick" style="left:${pct}%"></div>`;
    }
  });
  wrap.innerHTML=html;
}
function radarRenderFrame(i){
  const frame=radarFrames[i];
  if(!frame||!radarMap)return;
  const url=`${radarHost}${frame.path}/256/{z}/{x}/{y}/2/1_1.png`;
  if(radarLayer)radarLayer.setUrl(url);
  else radarLayer=L.tileLayer(url,{opacity:.75,maxNativeZoom:12}).addTo(radarMap);
  const offsetMin=(i-(radarPastLen-1))*radarFrameStepMin();
  const isForecast=i>=radarPastLen;
  const label=offsetMin===0?'Jetzt':(offsetMin>0?`Prognose +${offsetMin} Min.`:`${Math.abs(offsetMin)} Min. zurück`);
  document.getElementById('radar-time').textContent=label;
  const badge=document.getElementById('radar-badge');
  badge.textContent=isForecast?'PROGNOSE':'LIVE';
  badge.classList.toggle('forecast',isForecast);
}
function radarSeek(i){
  radarIndex=+i;
  radarRenderFrame(radarIndex);
}
function radarTogglePlay(){
  const btn=document.getElementById('radar-play');
  radarPlaying=!radarPlaying;
  if(radarPlaying){
    btn.textContent='⏸';
    radarTimer=setInterval(()=>{
      radarIndex=(radarIndex+1)%radarFrames.length;
      document.getElementById('radar-slider').value=radarIndex;
      radarRenderFrame(radarIndex);
    },700);
  }else{
    btn.textContent='▶';
    clearInterval(radarTimer);
  }
}

try{const l=JSON.parse(localStorage.getItem(LASTLOC_KEY)||'null');if(l&&l.mode)activeLoc=l;}catch(e){}

// ── Favoriten: Drag & Drop / Touch-Reihenfolge ───────────────────────────────
let dragState=null, dragSuppressClick=false, dragIndicator=null;
function initFavDrag(){
  const el=document.getElementById('loc-chips');
  el.addEventListener('pointerdown',favDragStart);
  el.addEventListener('pointermove',favDragMove);
  el.addEventListener('pointerup',favDragEnd);
  el.addEventListener('pointercancel',favDragEnd);
}
function favDragStart(e){
  if(!favEditMode)return;
  if(e.target.closest('.chip-remove'))return;
  const chip=e.target.closest('.chip.fav');
  if(!chip)return;
  dragState={pointerId:e.pointerId,el:chip,startX:e.clientX,startY:e.clientY,moved:false};
}
function favDragMove(e){
  if(!dragState||e.pointerId!==dragState.pointerId)return;
  const chip=dragState.el;
  const dx=e.clientX-dragState.startX, dy=e.clientY-dragState.startY;
  if(!dragState.moved){
    if(Math.hypot(dx,dy)<6)return;
    dragState.moved=true;
    const r=chip.getBoundingClientRect();
    dragState.origLeft=r.left;dragState.origTop=r.top;
    try{chip.setPointerCapture(e.pointerId);}catch(err){}
    dragIndicator=document.createElement('div');
    dragIndicator.className='drop-indicator';
    chip.parentNode.insertBefore(dragIndicator,chip);
    chip.classList.add('dragging');
    chip.style.position='fixed';
    chip.style.left=r.left+'px';
    chip.style.top=r.top+'px';
    chip.style.width=r.width+'px';
  }
  e.preventDefault();
  chip.style.left=(dragState.origLeft+dx)+'px';
  chip.style.top=(dragState.origTop+dy)+'px';
  const container=document.getElementById('loc-chips');
  const siblings=[...container.querySelectorAll('.chip.fav')].filter(c=>c!==chip);
  let placed=false;
  for(const sib of siblings){
    const r=sib.getBoundingClientRect();
    if(e.clientX<r.left+r.width/2){
      container.insertBefore(dragIndicator,sib);
      placed=true;
      break;
    }
  }
  if(!placed){
    const addBtn=container.querySelector('.chip.add-btn');
    container.insertBefore(dragIndicator,addBtn||null);
  }
}
function favDragEnd(e){
  if(!dragState||e.pointerId!==dragState.pointerId)return;
  const wasMoved=dragState.moved;
  const chip=dragState.el;
  if(wasMoved){
    const container=document.getElementById('loc-chips');
    container.insertBefore(chip,dragIndicator);
    dragIndicator.remove();dragIndicator=null;
    chip.classList.remove('dragging');
    chip.style.position='';chip.style.left='';chip.style.top='';chip.style.width='';
    const keys=[...container.querySelectorAll('.chip.fav')].map(c=>c.dataset.key);
    favs=keys.map(k=>favs.find(f=>favKey(f)===k)).filter(Boolean);
    persistFavs();
    dragSuppressClick=true;
    renderChips();
  }
  dragState=null;
}
function toggleSearch(show){

  el.style.display=vis?'block':'none';

let searchDebounce=null, searchReqId=0;
function onSearchInput(){
  clearTimeout(searchDebounce);
  const q=document.getElementById('search-input').value.trim();
  const box=document.getElementById('search-results');
  if(q.length<2){searchReqId++;box.innerHTML='';return;}

async function runSearch(){
  clearTimeout(searchDebounce);
  const q=document.getElementById('search-input').value.trim();
  const box=document.getElementById('search-results');
  if(!q){box.innerHTML='';return;}
  const myId=++searchReqId;
  box.innerHTML='<div class="sr-note">Suche…</div>';
  try{
    const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=6&language=de&format=json`);
    if(myId!==searchReqId)return;
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(myId!==searchReqId)return;
    searchResults=(j.results||[]).map(x=>({name:x.name,lat:x.latitude,lon:x.longitude,info:[x.admin1,x.country].filter(Boolean).join(', ')}));
    box.innerHTML=searchResults.length
      ?searchResults.map((x,i)=>`<button class="sr-item" onclick="pickResult(${i})">${esc(x.name)}<span>${esc(x.info)}</span></button>`).join('')
      :'<div class="sr-note">Kein Ort gefunden.</div>';
  }catch(e){
    if(myId!==searchReqId)return;
    box.innerHTML='<div class="sr-note">Suche fehlgeschlagen — bitte erneut versuchen.</div>';
  }
}
function pickResult(i){

let isLoading=false, hasRendered=false, lastTs='';
async function loadAll(){
  if(isLoading) return;
  isLoading=true;
  const btn=document.getElementById('reload-btn');
  btn.classList.add('loading');
  try{
    let lat,lon,pos=null;
    if(activeLoc.mode==='fixed'){
      lat=activeLoc.lat;lon=activeLoc.lon;
    }else{
      setBadge('Standort wird ermittelt…');
      pos=await getPosition();
      lat=pos?pos.lat:FALLBACK.lat;lon=pos?pos.lon:FALLBACK.lon;
    }
    setBadge('Wetterdaten werden geladen…');
    const [main,models,ens,place,warns]=await Promise.all([
      fetch(mainUrl(lat,lon)).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}),
      fetch(modelsUrl(lat,lon)).then(r=>r.ok?r.json():null).catch(()=>null),
      fetch(ensembleUrl(lat,lon)).then(r=>r.ok?r.json():null).catch(()=>null),
      (activeLoc.mode==='geo'&&pos)?fetchLocationName(lat,lon):Promise.resolve(null),
      fetchWarnings(lat,lon)
    ]);
    if(!main.current||!main.hourly||!main.daily) throw new Error('Unerwartetes Antwortformat');
    const data=buildWeatherData(main,models,buildEnsRain(ens));
    if(warns&&warns.length){
      const top=warns.find(w=>w.severity==='danger')||warns[0];
      data.warning={title:top.title+(warns.length>1?` (+${warns.length-1} weitere)`:''),text:top.text,severity:top.severity};
    }
    const locName=activeLoc.mode==='fixed'
      ? activeLoc.name
      : (pos?((place&&place.name)||'Dein Standort'):FALLBACK.name);
    const elev=main.elevation!=null?`${Math.round(main.elevation)} m ü. NN`:'';
    const region=(place&&place.region)?place.region:'';
    const coords=`${lat.toFixed(3)}°N ${lon.toFixed(3)}°O`;
    const locSub=(activeLoc.mode==='geo'&&!pos)
      ? `${elev} · Kein Standortzugriff — zeige ${FALLBACK.name}`
      : [elev,region,coords].filter(Boolean).join(' · ');
    setLocation(locName,locSub);
    render(data);
    hasRendered=true;
    shownLoc={name:locName,lat,lon};
    radarSetCenter(lat,lon);
    fetchRadarFrames();
    updateFavBtn();
    renderCheckBadge(doubleCheck(data));
    lastTs=`${data.meta.ts} ${data.meta.ts_time}`;
    setBadge(`Live · ${data.meta.nModels>1?data.meta.nModels+' Modelle':'Open-Meteo'} · ${lastTs}`);
    try{localStorage.setItem(CACHE_KEY,JSON.stringify({data,locName,locSub,loc:shownLoc}));}catch(e){}
  }catch(e){
    console.error('Wetter-Abruf fehlgeschlagen:',e);
    if(hasRendered){
      setBadge(`Stand ${lastTs||'unbekannt'} · Live-Update fehlgeschlagen`,true);
    }else{
      setLocation('offline','Keine Verbindung zur Wetter-API');
      showError(e.message||'Netzwerkfehler');
    }
  }finally{
    isLoading=false;
    btn.classList.remove('loading');
  }
}

  setLocation(cached.locName,cached.locSub);
  render(cached.data);
  hasRendered=true;
  shownLoc=cached.loc||null;
  updateFavBtn();
  lastTs=`${cached.data.meta.ts} ${cached.data.meta.ts_time}`;
  renderCheckBadge(doubleCheck(cached.data));
  setBadge(`Gespeichert · Stand ${lastTs}`,true);
}else{
  showLoading();
}
loadAll();

// Service Worker: App-Dateien offline vorhalten (nur über http/https, nicht bei file://)
// Übernimmt eine neue Version ein anderer Tab bereits aktiv gemachte Version,
// einmal neu laden — verhindert, dass eine alte Version stehen bleibt.
if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){
  let swReloaded=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(swReloaded)return;
    swReloaded=true;
    location.reload();
  });
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
</body>
</html>
